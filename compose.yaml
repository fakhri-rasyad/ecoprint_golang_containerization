services:
  app:
    build: ./golang_backend
    ports:
      - "3000:3000"
    env_file:
      - "./golang_backend/.env"
    environment:
      DB_HOST: postgres
      MQTT_HOST: mosquitto
    depends_on:
      migrate:
        condition: service_completed_successfully
      mosquitto:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend

  migrate:
    image: migrate/migrate
    volumes:
      - ./golang_backend/database/migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${DB_USERNAME}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}?sslmode=disable",
        "up",
      ]
    env_file:
      - ./golang_backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./golang_backend/.env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge
